name: 实习生开发任务
description: 为实习生创建范围明确、可验证的开发任务
title: "[Intern Task] "
body:
  - type: markdown
    attributes:
      value: |
        请完整填写以下内容，将 Issue 指派给唯一负责的实习生。实习生提交 PR 时必须使用 `Closes #Issue编号` 关联本任务。

  - type: textarea
    id: background
    attributes:
      label: 任务背景
      description: 说明业务背景、问题现状和任务价值。
      placeholder: 为什么需要完成这项任务？当前有什么问题？
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: 功能要求
      description: 使用可执行、无歧义的条目描述需要实现的功能。
      placeholder: |
        - [ ] 功能要求 1
        - [ ] 功能要求 2
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 列出管理员最终验收时逐项核对的结果。
      placeholder: |
        - [ ] 给定……时，应当……
        - [ ] 边界情况……应当……
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: 测试方式
      description: 写明需要执行的自动化命令和必要的手工验证步骤。
      placeholder: |
        自动化命令：
        手工验证步骤：
    validations:
      required: true

  - type: textarea
    id: allowed_scope
    attributes:
      label: 允许修改范围
      description: 精确到目录、文件或模块；未列出的范围默认不允许修改。
      placeholder: |
        - src/example/**
        - tests/example/**
    validations:
      required: true

  - type: textarea
    id: forbidden_scope
    attributes:
      label: 禁止修改范围
      description: 明确禁止触碰的业务、基础设施、权限或敏感配置。
      placeholder: |
        - .github/workflows/**
        - 生产环境配置和密钥
    validations:
      required: true

  - type: checkboxes
    id: manager_confirmation
    attributes:
      label: 管理者确认
      options:
        - label: 我已确认任务范围、验收标准和测试方式完整且不存在冲突。
          required: true
        - label: 我会将本 Issue 指派给唯一负责的实习生；只有该 Assignee 创建的关联 PR 才能通过门禁。
          required: true
